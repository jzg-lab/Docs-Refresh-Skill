interface:
  display_name: "Docs Refresh"
  short_description: "Refresh authoritative docs through routed modes, taxonomy mapping, and foundation checks"
  default_prompt: "Use the Docs Refresh workflow to treat the repository as the record system, start from AGENTS.md as a map, classify the request as current-state refresh, future-spec refinement, or actionable execution planning, treat explicit next-step or start-implementation language as actionable execution planning, resolve the directory containing this skill, run the bundled collector from that skill directory when possible, read `[repo_layout]`, `[planning]`, `[routing]`, and `[knowledge]`, treat `repo_taxonomy_mode`, `taxonomy_health`, `role_map`, `normalization_candidates`, `migration_candidates`, `plan_readiness`, `stale_plan_placement`, and `active_plan_target` as the routing contract, load the matching mode file, use the shared foundation checklist when early-project gaps still exist, use current workspace state for implemented behavior and explicit user intent plus repository constraints for future-work plan artifacts, reuse healthy custom docs domains when their role is clear, put execution-ready future work in `docs/exec-plans/active/`, materialize the planning scaffold and phase or file breakdown in the repository when the user explicitly wants implementation to proceed and the key planning inputs already exist, move any completed-marked active plan into `docs/exec-plans/completed/` in the same pass, write unresolved execution blockers into durable docs instead of chat-only follow-up, do not treat a bare plan scaffold as validation truth, normalize ad hoc docs folders into the standard domains while preserving prior source material under `old_docs/` when drift or planning requires it, update the smallest authoritative documents needed, and explain what changed or why no documentation update was needed."
